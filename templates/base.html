<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gerenciador de Tarefas{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('{% static "fonts/Inter-Regular.woff2" %}') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{% static "fonts/Inter-Medium.woff2" %}') format('woff2');
            font-weight: 500; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{% static "fonts/Inter-SemiBold.woff2" %}') format('woff2');
            font-weight: 600; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('{% static "fonts/Inter-Bold.woff2" %}') format('woff2');
            font-weight: 700; font-style: normal; font-display: swap;
        }
        :root {
            --cor-primaria:       #4f46e5;
            --cor-primaria-hover: #4338ca;
            --cor-perigo:         #dc2626;
            --cor-perigo-hover:   #b91c1c;
            --cor-sucesso:        #16a34a;
            --cor-aviso:          #d97706;
            --cor-fundo:          #f8f9fb;
            --cor-card:           #ffffff;
            --cor-borda:          #e5e7eb;
            --cor-texto:          #111827;
            --cor-texto-suave:    #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
        }

        /* ── Navbar ── */
        .navbar {
            background-color: var(--cor-primaria) !important;
            box-shadow: 0 1px 3px rgba(0,0,0,.15);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -.01em;
        }
        .nav-link-custom {
            color: rgba(255,255,255,.75);
            font-size: .875rem;
            font-weight: 500;
            padding: .3rem .75rem;
            border-radius: .375rem;
            text-decoration: none;
            transition: background .15s, color .15s;
        }
        .nav-link-custom:hover,
        .nav-link-custom.active {
            color: #fff;
            background-color: rgba(255,255,255,.15);
        }

        /* ── Typography ── */
        h2 { font-weight: 700; font-size: 1.35rem; color: var(--cor-texto); }

        /* ── Buttons ── */
        .btn { font-size: .875rem; font-weight: 500; }
        .btn-primary  { background-color: var(--cor-primaria);  border-color: var(--cor-primaria); }
        .btn-primary:hover, .btn-primary:focus {
            background-color: var(--cor-primaria-hover); border-color: var(--cor-primaria-hover);
        }
        .btn-outline-primary { color: var(--cor-primaria); border-color: var(--cor-primaria); }
        .btn-outline-primary:hover { background-color: var(--cor-primaria); border-color: var(--cor-primaria); }

        .btn-danger  { background-color: var(--cor-perigo);  border-color: var(--cor-perigo); }
        .btn-danger:hover, .btn-danger:focus {
            background-color: var(--cor-perigo-hover); border-color: var(--cor-perigo-hover);
        }
        .btn-outline-danger  { color: var(--cor-perigo);  border-color: var(--cor-perigo); }
        .btn-outline-danger:hover  { background-color: var(--cor-perigo);  border-color: var(--cor-perigo); }

        .btn-outline-success { color: var(--cor-sucesso); border-color: var(--cor-sucesso); }
        .btn-outline-success:hover { background-color: var(--cor-sucesso); border-color: var(--cor-sucesso); }

        /* ── Cards ── */
        .card {
            border: 1px solid var(--cor-borda);
            border-radius: .75rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        /* ── Forms ── */
        .form-control, .form-select {
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            border-color: var(--cor-borda);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--cor-primaria);
            box-shadow: 0 0 0 .2rem rgba(79,70,229,.2);
        }
        .form-label { font-weight: 500; font-size: .875rem; }
        .form-text  { font-size: .8rem; color: var(--cor-texto-suave); }

        /* ── List group ── */
        .list-group-item { border-color: var(--cor-borda); font-size: .9rem; }

        /* ── Badges ── */
        .badge { font-size: .75rem; font-weight: 500; }

        /* ── Code block (para logs) ── */
        .log-block {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Courier New', monospace;
            font-size: .8rem;
            padding: 1rem;
            border-radius: .5rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container d-flex align-items-center gap-3" style="max-width:960px;">
            <a class="navbar-brand me-3" href="/">Gerenciador</a>
            <a href="{% url 'lista_tarefas' %}"
               class="nav-link-custom {% block nav_tarefas %}{% endblock %}">
                Tarefas
            </a>
            <a href="{% url 'lista_agendadas' %}"
               class="nav-link-custom {% block nav_agendador %}{% endblock %}">
                Agendador
            </a>
            <a href="{% url 'lista_logs' %}"
               class="nav-link-custom {% block nav_logs %}{% endblock %}">
                Logs
            </a>
            <a href="{% url 'lista_configuracoes' %}"
               class="nav-link-custom {% block nav_config %}{% endblock %}">
                Configurações
            </a>
            <a href="{% url 'lista_projetos' %}"
               class="nav-link-custom {% block nav_paineis %}{% endblock %}">
                Gestão de Painéis
            </a>
        </div>
    </nav>

    <div class="container" style="{% block container_style %}max-width:960px;{% endblock %}">
        {% if messages %}
        <div class="mb-3">
            {% for msg in messages %}
            <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show py-2" role="alert" style="font-size:.875rem;">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
