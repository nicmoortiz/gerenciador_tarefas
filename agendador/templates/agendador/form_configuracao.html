{% extends 'base.html' %}
{% block nav_config %}active{% endblock %}

{% block content %}
<h2 class="mb-1">Editar Configuração</h2>
<p class="text-muted mb-4" style="font-size:.875rem;">
    <code>{{ config.chave }}</code>
</p>

<div class="card p-4" style="max-width:480px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url 'lista_configuracoes' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
