{% extends 'base.html' %}
{% block nav_paineis %}active{% endblock %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h2 class="mb-4">{{ titulo }}</h2>

<div class="card p-4" style="max-width:480px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger" style="font-size:.8rem;">{{ field.errors.0 }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url voltar_url voltar_pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
