{% extends 'base.html' %}
{% block nav_tarefas %}active{% endblock %}

{% block content %}
<h2 class="mb-4">{{ titulo }}</h2>

<div class="card p-4" style="max-width:560px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{% url 'lista_tarefas' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
